spring:
  application:
    name: linux-pkg-mgr

  ai:
    ollama:
      base-url: http://localhost:11435
      embedding:
        model: nomic-embed-text   # ollama pull nomic-embed-text
      chat:
        model: qwen2.5:3b     # any tool-calling capable model: qwen2.5, llama3.2, mistral-nemo
        options:
          temperature: 0.2    # low temperature — deterministic tool-calling behaviour
          num-ctx: 8192        # context window (increase for long package lists)

    # MCP client — disabled until MCP servers are configured
    mcp:
      client:
        enabled: false
        # Example: enable the Flathub or system MCP server when ready
        # servers:
        #   flathub:
        #     command: npx
        #     args: [ "-y", "@flathub/mcp-server" ]

pkg-mgr:
  list:
    max-results: 50   # cap on packages returned to the LLM in a single response

  tools:
    top-k: 6                    # max tools returned per query
    similarity-threshold: 0.4   # minimum cosine similarity to include a tool

  cloud:
    base-url: http://localhost:11435   # override with your remote Ollama URL
    model: gpt-oss:120b-cloud                 # larger tool-calling capable model
    #model: llama3.2:latest
    temperature: 0.2
    num-ctx: 32768

